name: Deploy React Frontend to Azure App Service

on:
  push:
    branches: [ master ]
    paths:
      - 'BlogApp.React/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BlogApp.React
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: BlogApp.React/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build
        env:
          # Injected at build time — no .env.production file needed
          VITE_API_BASE_URL: https://blogapp-api.azurewebsites.net/api

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'blogapp-frontend'
          publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
          package: BlogApp.React
